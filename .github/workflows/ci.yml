name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Run unit tests with coverage
        run: bun run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: backend/coverage/

  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fintech
          POSTGRES_PASSWORD: fintech123
          POSTGRES_DB: financial_helper_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://fintech:fintech123@localhost:5432/financial_helper_test
      JWT_SECRET: test_jwt_secret_ci_only_abc123
      JWT_REFRESH_SECRET: test_refresh_secret_ci_only_xyz789
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 8080
      NODE_ENV: test
      BCRYPT_ROUNDS: 4

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Run migrations
        run: bunx prisma migrate deploy

      - name: Run E2E tests
        run: bun run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Build
        run: bun run build

      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      AR_REPO: ${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}
      CLOUD_SQL_INSTANCE: ${{ vars.GCP_CLOUD_SQL_INSTANCE }}
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - uses: actions/checkout@v4

      # GCP_SA_KEY debe estar en Secrets (pestaña Secrets, no Variables)
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Validate deploy variables
        run: |
          echo "REGION='${REGION}'"
          echo "PROJECT_ID='${PROJECT_ID}'"
          echo "AR_REPO='${AR_REPO}'"
          echo "CLOUD_SQL_INSTANCE='${CLOUD_SQL_INSTANCE}'"
          MISSING=""
          [ -z "${REGION}" ]             && MISSING="$MISSING GCP_REGION"
          [ -z "${PROJECT_ID}" ]         && MISSING="$MISSING GCP_PROJECT_ID"
          [ -z "${AR_REPO}" ]            && MISSING="$MISSING GCP_AR_REPO"
          [ -z "${CLOUD_SQL_INSTANCE}" ] && MISSING="$MISSING GCP_CLOUD_SQL_INSTANCE"
          if [ -n "$MISSING" ]; then
            echo ""
            echo "ERROR: The following GitHub Repository Variables are missing or empty:"
            echo "  $MISSING"
            echo ""
            echo "Go to: Settings → Secrets and variables → Actions → Variables tab"
            exit 1
          fi

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      # ── Backend ──────────────────────────────────────────────
      - name: Build & push backend image
        run: |
          IMAGE=${REGION}-docker.pkg.dev/${AR_REPO}/backend:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE
          echo "BACKEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy financial-helper-backend \
            --image $BACKEND_IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --add-cloudsql-instances $CLOUD_SQL_INSTANCE \
            --update-secrets="DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest" \
            --set-env-vars="NODE_ENV=production,JWT_EXPIRES_IN=15m,JWT_REFRESH_EXPIRES_IN=7d,BCRYPT_ROUNDS=12"

      - name: Get backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe financial-helper-backend \
            --region $REGION --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ── Frontend ─────────────────────────────────────────────
      - name: Build & push frontend image
        run: |
          IMAGE=${REGION}-docker.pkg.dev/${AR_REPO}/frontend:${{ github.sha }}
          docker build -t $IMAGE ./frontend
          docker push $IMAGE
          echo "FRONTEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy financial-helper-frontend \
            --image $FRONTEND_IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars="NEXT_PUBLIC_API_URL=${{ steps.backend.outputs.url }}"

      - name: Update backend CORS with frontend URL
        run: |
          FRONTEND_URL=$(gcloud run services describe financial-helper-frontend \
            --region $REGION --format='value(status.url)')
          gcloud run services update financial-helper-backend \
            --region $REGION \
            --update-env-vars="FRONTEND_URL=$FRONTEND_URL"
